name: Claude - PR Auto-Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request using `.github/review-instructions.md`.
            Read `AGENTS.md` and the relevant `.agents/skills/*/rules/*.md`
            files for the changed paths before posting findings.

            Use `gh pr comment` for the top-level summary.
            Use `mcp__github_inline_comment__create_inline_comment` with
            `confirmed: true` for specific inline findings.
            Only post GitHub comments. Do not submit review text as messages.
          claude_args: |
            --allowedTools "Read,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
