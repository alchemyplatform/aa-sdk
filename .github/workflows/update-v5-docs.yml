name: Update V5 SDK Reference Docs

on:
  # Called by publish-v5-beta workflow after successful publish
  workflow_call:
    inputs:
      version:
        description: "The published version (for commit message and PR comment)"
        required: false
        type: string
        default: ""
    secrets:
      PR_BYPASSER_APP_ID:
        required: true
      PR_BYPASSER_PRIVATE_KEY:
        required: true
      OPENAI_API_KEY:
        required: true

  # Can also be triggered manually
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the PR (optional, for reference only)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-v5-docs
  cancel-in-progress: false

jobs:
  update_v5_docs:
    name: Generate V5 Docs and Create PR
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PR_BYPASSER_APP_ID }}
          private-key: ${{ secrets.PR_BYPASSER_PRIVATE_KEY }}

      - name: Checkout v5.x.x branch
        uses: actions/checkout@v3
        with:
          ref: v5.x.x
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: "0"
          submodules: "recursive"

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build V5 Packages
        run: pnpm run build:libs

      - name: Generate V5 SDK Reference Docs
        run: |
          pnpm docs:sdk
          pnpm lint:write

      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: main-branch

      - name: Copy V5 reference docs to main branch
        run: |
          # Get the list of packages included in nav from generate-typedoc-yaml.ts
          PACKAGES=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('scripts/generate-typedoc-yaml.ts', 'utf-8');
            const match = content.match(/PACKAGES_INCLUDED_IN_NAV[^=]*=\s*\[([^\]]*)\]/);
            if (match) {
              const pkgs = match[1].match(/['\"]([^'\"]+)['\"]/g).map(s => s.replace(/['\"/]/g, ''));
              console.log(pkgs.join(' '));
            }
          ")

          if [ -z "$PACKAGES" ]; then
            echo "::error::Failed to parse PACKAGES_INCLUDED_IN_NAV from generate-typedoc-yaml.ts"
            exit 1
          fi

          echo "Copying v5 reference docs for packages: $PACKAGES"

          for pkg in $PACKAGES; do
            echo "  Copying docs/pages/reference/$pkg"
            rm -rf "main-branch/docs/pages/reference/$pkg"
            if [ -d "docs/pages/reference/$pkg" ]; then
              cp -r "docs/pages/reference/$pkg" "main-branch/docs/pages/reference/$pkg"
            else
              echo "  Warning: docs/pages/reference/$pkg does not exist, skipping"
            fi
          done

      - name: Merge V5 SDK Reference into main docs.yml
        run: |
          npx tsx scripts/merge-v5-docs-to-main.ts \
            --v5-docs-yml docs/docs.yml \
            --main-docs-yml main-branch/docs/docs.yml

      - name: Create PR for V5 docs update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd main-branch

          git config user.name "Alchemy Bot"
          git config user.email "alchemy-bot@alchemy.com"

          BRANCH_NAME="docs/v5-sdk-reference-update"
          VERSION="${{ inputs.version }}"

          # Create or reset the docs branch from main
          git checkout -B "$BRANCH_NAME"

          # Stage all docs changes
          git add docs/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No docs changes detected, skipping PR creation"
            exit 0
          fi

          COMMIT_MSG="docs: update v5 SDK reference docs"
          if [ -n "$VERSION" ]; then
            COMMIT_MSG="$COMMIT_MSG for $VERSION"
          fi
          git commit -m "$COMMIT_MSG"

          git push --force origin "$BRANCH_NAME"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --base main --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists and has been updated with new commit"
            if [ -n "$VERSION" ]; then
              gh pr comment "$EXISTING_PR" --body "Updated with v5 SDK reference docs for version $VERSION"
            fi
          else
            gh pr create \
              --title "docs: update v5 SDK reference docs" \
              --body "$(cat <<EOF
          Auto-generated PR to merge v5 SDK reference documentation into main branch.

          Version: ${VERSION:-manual trigger}

          This PR:
          - Adds/updates v5 reference MDX files
          - Merges v5 SDK Reference sections into docs.yml alongside existing v4 sections

          Generated by the update-v5-docs workflow.
          EOF
          )" \
              --base main \
              --head "$BRANCH_NAME"
          fi
