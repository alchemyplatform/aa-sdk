name: Publish Packages

# workflow dispatch requires a maintainer to go to the Actions tab and manually trigger the workflow
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish packages (leave unchecked for dry-run)"
        required: true
        default: false
        type: boolean

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent publish
concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    # Needed for Publishing
    permissions:
      contents: write
      packages: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PR_BYPASSER_APP_ID }}
          private-key: ${{ secrets.PR_BYPASSER_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: "0"
          submodules: "recursive"

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h

      - name: Setup
        uses: ./.github/actions/setup

      - name: Set Github User Details
        run: |
          git config --global user.name "Alchemy Bot"
          git config --global user.email "alchemy-bot@alchemy.com"

      - name: Set NPM Permissions
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc

      # lerna publish handles: version bump, build (via `version` lifecycle), commit, tag, npm publish, and git push
      - name: Publish using Lerna
        if: inputs.publish
        shell: bash
        run: pnpm lerna publish --conventional-commits --no-private --yes --no-verify-access
