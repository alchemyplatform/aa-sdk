name: Publish new Package

# workflow dispatch requires a maintainer to go to the Actions tab and manually trigger the workflow
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Flag to publish new package"
        required: true
        default: false
        type: boolean

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

# If we ever migrate this to not be manual, we HAVE to check that the commit
# it is running against DOES NOT contain [skip-ci] in the commit message
jobs:
  build_and_test_deploy:
    name: Build and Publish
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    # Needed for Publishing
    permissions:
      contents: write  
      packages: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PR_BYPASSER_APP_ID }}
          private-key: ${{ secrets.PR_BYPASSER_PRIVATE_KEY }}

      - name: "Checkout files"
        uses: actions/checkout@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: "0"
          submodules: "recursive"
      
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h
          
      - name: Setup
        uses: ./.github/actions/setup
        with:
          # skip android cache for this because it's not working with the publish step below
          use-android-cache: false

      - name: Set Github User Details
        run: |
          git config --global user.name "Alchemy Bot"
          git config --global user.email "alchemy-bot@alchemy.com"

      - name: Set NPM Permissions
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc

      # Lerna publish will compute the new version, update files, run precommit hooks, tag, and publish to NPM
      - name: Publish using Lerna
        if: inputs.publish
        env:
          API_KEY: ${{ secrets.API_KEY }}
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        shell: bash
        run: yarn lerna publish --conventional-commits --no-private --yes --no-verify-access --no-push

      # Push version commit and tags via GitHub API
      - name: Push Changes to main
        if: inputs.publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "Updating main to $COMMIT_SHA"
          gh api repos/alchemyplatform/aa-sdk/git/refs/heads/main \
            -X PATCH \
            -f sha="$COMMIT_SHA" \
            -F force=false

          # Push tags
          for tag in $(git tag --points-at HEAD); do
            TAG_SHA=$(git rev-parse "$tag")
            echo "Creating tag $tag -> $TAG_SHA"
            gh api repos/alchemyplatform/aa-sdk/git/refs \
              -X POST \
              -f ref="refs/tags/$tag" \
              -f sha="$TAG_SHA"
          done
